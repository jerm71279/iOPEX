# iOPEX Core Stack — Docker Compose
#
# 4-layer architecture mirroring ai-ops-tools maturity:
#   Layer 4: Gateway        → nginx (8080)
#   Layer 3: Services       → digital-expert-api (8001), mcp-hub (8002→8010), bot, watcher
#   Layer 2: Persistence    → postgres+pgvector (5432), redis (6379)
#   Layer 1: Optional       → n8n (profile: n8n)
#
# Usage:
#   docker compose up -d                          # Core stack (gateway + services + persistence)
#   docker compose --profile n8n up -d            # + n8n workflow engine
#   docker compose down                           # Stop (keeps volumes)
#   docker compose down -v                        # Stop + wipe data (full reset)
#
# First time:
#   cp .env.example .env && nano .env             # Set API keys
#   docker compose up -d
#   curl http://localhost:8080/health              # Verify gateway
#   curl http://localhost:8080/api/services        # Service registry
#
# MCP endpoints (for Claude Code .mcp.json):
#   http://localhost:8010/mcp/shift/sse
#   http://localhost:8010/mcp/iopex/sse
#   http://localhost:8010/mcp/pam-status/sse

services:

  # ── Layer 2: Persistence ─────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iopex_expert}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./digital-expert/db/pg_rls_init.sql:/docker-entrypoint-initdb.d/01_rls.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-iopex_expert}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - iopex-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - iopex-network

  # ── Layer 3: Services ────────────────────────────────────────────────

  digital-expert-api:
    build:
      context: ./digital-expert
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iopex_expert}
      REDIS_URL: redis://redis:6379
    volumes:
      - knowledge_data:/app/knowledge
      - ./digital-expert/tenants:/app/tenants:ro
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iopex-network

  bot:
    build:
      context: ./digital-expert
      dockerfile: Dockerfile
    entrypoint: ["python3", "run.py"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iopex_expert}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./digital-expert/tenants:/app/tenants:ro
    restart: unless-stopped
    depends_on:
      digital-expert-api:
        condition: service_healthy
    networks:
      - iopex-network

  watcher:
    build:
      context: ./digital-expert
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iopex_expert}
    volumes:
      - knowledge_data:/app/knowledge
    restart: unless-stopped
    depends_on:
      digital-expert-api:
        condition: service_healthy
    networks:
      - iopex-network

  mcp-hub:
    build:
      context: ./mcp-hub
      dockerfile: Dockerfile
    environment:
      IOPEX_API_URL: http://digital-expert-api:8001
      SHIFT_API_URL: ${SHIFT_API_URL:-http://digital-expert-api:8001}
    ports:
      - "127.0.0.1:8010:8002"
    restart: unless-stopped
    depends_on:
      digital-expert-api:
        condition: service_healthy
    networks:
      - iopex-network

  # ── Layer 4: Gateway ─────────────────────────────────────────────────

  gateway:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      digital-expert-api:
        condition: service_healthy
      mcp-hub:
        condition: service_healthy
    networks:
      - iopex-network

  # ── Layer 1: Optional (profiles) ─────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    profiles: ["n8n"]
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      N8N_HOST: localhost
      N8N_PORT: "5678"
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iopex-network

# ── Volumes ──────────────────────────────────────────────────────────

volumes:
  postgres_data:
    name: iopex_postgres_data
  redis_data:
    name: iopex_redis_data
  knowledge_data:
    name: iopex_knowledge_data
  n8n_data:
    name: iopex_n8n_data

# ── Network ──────────────────────────────────────────────────────────

networks:
  iopex-network:
    driver: bridge
    name: iopex-network
