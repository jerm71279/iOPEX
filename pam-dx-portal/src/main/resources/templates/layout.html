<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} ?: 'SHIFT Portal'">SHIFT Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">SHIFT</div>
    <div class="sidebar-vendor" th:text="'VENDOR: ' + ${vendor}">VENDOR: CyberArk</div>
    <a th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active'">
      <span>&#x25A3;</span> Dashboard
    </a>
    <a th:href="@{/secrets}" th:classappend="${activePage == 'secrets'} ? 'active'">
      <span>&#x1F511;</span> Secrets
    </a>
    <a th:href="@{/sessions}" th:classappend="${activePage == 'sessions'} ? 'active'">
      <span>&#x25B6;</span> Sessions
    </a>
    <a th:href="@{/swagger-ui.html}" target="_blank" style="margin-top:auto;">
      <span>&#x2194;</span> API Docs
    </a>
    <a th:href="@{/logout}">
      <span>&#x23FB;</span> Logout
    </a>
  </nav>

  <main class="main-content" th:fragment="content">
    <!-- Page content injected here -->
  </main>
</body>
</html>
