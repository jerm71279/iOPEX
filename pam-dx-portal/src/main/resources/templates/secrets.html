<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secrets — PAM DX Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">PAM DX</div>
    <div class="sidebar-vendor" th:text="'VENDOR: ' + ${vendor}">VENDOR: CyberArk</div>
    <a th:href="@{/}"><span>&#x25A3;</span> Dashboard</a>
    <a th:href="@{/secrets}" class="active"><span>&#x1F511;</span> Secrets</a>
    <a th:href="@{/sessions}"><span>&#x25B6;</span> Sessions</a>
    <a th:href="@{/swagger-ui.html}" target="_blank" style="margin-top:auto;"><span>&#x2194;</span> API Docs</a>
    <a th:href="@{/logout}"><span>&#x23FB;</span> Logout</a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Privileged Accounts</div>
      <div class="page-subtitle" th:text="'Browse and manage accounts via ' + ${vendor} + ' adapter'">Browse accounts</div>
    </div>

    <div class="data-table-wrapper">
      <div class="table-header">
        <div class="table-title" th:text="${accounts != null} ? ${#lists.size(accounts)} + ' accounts' : 'Not connected'">Accounts</div>
        <input type="text" class="search-input" placeholder="Search accounts..." id="searchInput" onkeyup="filterTable()">
      </div>
      <div style="overflow-x:auto;">
        <table id="accountsTable">
          <thead>
            <tr>
              <th>NAME</th>
              <th>USERNAME</th>
              <th>ADDRESS</th>
              <th>CONTAINER</th>
              <th>PLATFORM</th>
              <th>TYPE</th>
              <th>MANAGED</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="account : ${accounts}">
              <td style="font-weight:600; color:var(--text-bright);" th:text="${account.name()}">—</td>
              <td th:text="${account.username()}">—</td>
              <td style="font-family:var(--font-mono); font-size:0.75rem;" th:text="${account.address()}">—</td>
              <td>
                <span class="badge badge-blue" th:text="${account.containerName()}">—</span>
              </td>
              <td style="font-family:var(--font-mono); font-size:0.72rem;" th:text="${account.platformType()}">—</td>
              <td>
                <span th:class="${account.accountType() == 'service'} ? 'badge badge-amber' : 'badge badge-green'"
                      th:text="${account.accountType()}">human</span>
              </td>
              <td>
                <span th:class="${account.managed()} ? 'badge badge-green' : 'badge badge-red'"
                      th:text="${account.managed()} ? 'YES' : 'NO'">—</span>
              </td>
            </tr>
            <tr th:if="${accounts == null || #lists.isEmpty(accounts)}">
              <td colspan="7" style="text-align:center; color:var(--text-muted); padding:40px;">
                No accounts loaded. Connect to a PAM vendor first.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    function filterTable() {
      const filter = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll('#accountsTable tbody tr');
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
      });
    }
  </script>
</body>
</html>
