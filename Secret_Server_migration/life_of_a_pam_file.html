<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Life of a PAM File — CyberArk → Secret Server</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #030712; color: #f8fafc; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { text-align: center; padding: 15px 20px; }
        .header h2 { color: #06d6a0; margin: 0; font-size: 1.2rem; }
        .header p { color: #64748b; font-size: 0.85rem; margin: 4px 0 0; }
        .header .ss-badge { display: inline-block; background: rgba(239,68,68,0.15); color: #ef4444; font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; margin-top: 4px; }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 10px; padding: 0 0 10px; }
        .controls button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: 0.2s; }
        .btn-play { background: #06d6a0; color: #030712; }
        .btn-play.paused { background: #3b82f6; }
        .btn-play:hover { opacity: 0.85; }
        .btn-step { background: #1e293b; color: #94a3b8; border: 1px solid #334155 !important; }
        .btn-step:hover { background: #334155; color: #f1f5f9; }
        .btn-step:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Architecture Layout */
        .viewport { flex: 1; position: relative; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; min-height: 160px; }
        .comp-node { width: 110px; height: 85px; border: 2px solid #1e293b; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; position: relative; z-index: 10; transition: 0.4s; flex-shrink: 0; }
        .comp-node.active { border-color: #06d6a0; box-shadow: 0 0 30px rgba(6, 214, 160, 0.35); transform: scale(1.1); }
        .comp-node.active.warn { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.35); }
        .comp-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; margin-top: 6px; font-weight: 700; letter-spacing: 0.5px; text-align: center; line-height: 1.2; }

        /* Connection lines */
        .connection-line { position: absolute; top: 50%; height: 2px; background: #1e293b; z-index: 1; }
        .connection-line.active { background: linear-gradient(90deg, #06d6a0, #3b82f6); height: 3px; box-shadow: 0 0 8px rgba(6, 214, 160, 0.3); }

        /* The PAM File Packet */
        .pam-packet {
            position: absolute; width: 48px; height: 56px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: all 1.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 24px rgba(251, 191, 36, 0.5);
            background: #fbbf24;
        }
        .pam-packet.frozen { background: #3b82f6; box-shadow: 0 0 24px rgba(59, 130, 246, 0.5); }
        .pam-packet.ss { background: #06d6a0; box-shadow: 0 0 24px rgba(6, 214, 160, 0.5); }
        .pam-packet.danger { background: #ef4444; box-shadow: 0 0 24px rgba(239, 68, 68, 0.5); }
        .pam-packet .pam-icon { font-size: 18px; }
        .pam-packet .pam-name { font-size: 7px; color: #000; font-weight: 800; letter-spacing: 0.3px; }

        /* Step indicator */
        .step-bar { display: flex; justify-content: center; gap: 6px; padding: 8px 0; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #1e293b; transition: 0.3s; }
        .step-dot.done { background: #06d6a0; }
        .step-dot.current { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; transform: scale(1.3); }

        /* Documentation Panel */
        .doc-panel { height: 300px; background: #0f172a; border-top: 1px solid #1e293b; padding: 20px 30px; display: flex; gap: 24px; }
        .doc-card { flex: 1.2; background: #1e293b; border-radius: 12px; padding: 18px; border-left: 4px solid #06d6a0; overflow-y: auto; }
        .doc-card.warn { border-left-color: #ef4444; }
        .doc-card .doc-label { color: #06d6a0; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .doc-card.warn .doc-label { color: #ef4444; }
        .doc-card h3 { margin: 0 0 8px; font-size: 1rem; color: #f1f5f9; }
        .doc-card p { line-height: 1.6; color: #cbd5e1; font-size: 0.85rem; margin: 0; }
        .doc-card .executing { margin-top: 14px; font-size: 0.75rem; color: #94a3b8; }
        .doc-card .executing strong { color: #cbd5e1; }
        .doc-card .ss-diff { margin-top: 12px; padding: 8px 12px; background: rgba(239,68,68,0.1); border-left: 3px solid #ef4444; border-radius: 4px; font-size: 0.75rem; color: #fca5a5; }
        .doc-card .ss-diff strong { color: #ef4444; }

        .tech-specs { flex: 0.8; font-family: 'Courier New', 'Consolas', monospace; background: #020617; border-radius: 10px; padding: 15px; color: #22c55e; font-size: 0.8rem; overflow-y: auto; border: 1px solid #0f172a; }
        .tech-specs .spec-label { color: #64748b; margin-bottom: 8px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        .tech-specs .spec-line { margin-bottom: 4px; }
        .tech-specs .spec-line.warn { color: #ef4444; }
        .tech-specs .spec-line.info { color: #3b82f6; }
        .tech-specs .spec-line.gold { color: #fbbf24; }
        .tech-specs .status-line { margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const workflow = [
            {
                id: "DISCOVERY",
                nodeIdx: 0,
                component: "On-Prem Vault",
                action: "Targeting SQL_SVC_PROD",
                packetState: "default",
                packetIcon: "🔑",
                isWarn: false,
                doc: "Agent 01 initiates a multi-signal scan against the CyberArk PVWA. It identifies the SQL Server account, cross-references it with the Applications API to find CCP/AAM dependencies, and checks Secret Server for a matching template (MSSql → SQL Server Account).",
                diff: null,
                specs: [
                    { text: "> GET /PasswordVault/API/Accounts", cls: "" },
                    { text: "> Found: SQL_SVC_PROD (MSSql)", cls: "" },
                    { text: "> Dependency: WebStore_App (CCP)", cls: "gold" },
                    { text: "> SS Template: SQL Server Account ✓", cls: "info" },
                    { text: "> NHI Check: FALSE (human identity)", cls: "" },
                    { text: "> Status: IDENTIFIED", cls: "" },
                ]
            },
            {
                id: "PERMISSIONS",
                nodeIdx: 1,
                component: "Agent 03 (Mapper)",
                action: "22→4 Folder Role + 200+ System Permission Mapping",
                packetState: "danger",
                packetIcon: "⚠️",
                isWarn: true,
                doc: "Agent 03 pulls the Safe Members list and reads all 22 individual permission bits. Unlike Privilege Cloud (1:1 mapping), Secret Server maps these to 4 folder roles (Owner, Edit, Add Secret, View) plus 200+ granular system role permissions. Folder-level mapping requires careful escalation analysis.",
                diff: "PRIVILEGE CLOUD: 22 permissions → 22 permissions (1:1, zero loss). SECRET SERVER: 22 safe permissions → 4 folder roles + 200+ system role permissions (different model, escalation risk at folder level).",
                specs: [
                    { text: "> GET /Safes/SQL-Prod/Members", cls: "" },
                    { text: "> Members: 6 (excluding built-ins)", cls: "" },
                    { text: "> AD_SQL_Admins → Owner", cls: "info" },
                    { text: "> SVC_WebStore → View", cls: "info" },
                    { text: "> DBA_Team → Edit (ESCALATED ↑)", cls: "warn" },
                    { text: "> Lost permissions: 3 per member", cls: "warn" },
                    { text: "> Status: MAPPED (review required)", cls: "gold" },
                ]
            },
            {
                id: "FREEZE",
                nodeIdx: 2,
                component: "Coordinator",
                action: "Locking Source Account",
                packetState: "frozen",
                packetIcon: "❄️",
                isWarn: false,
                doc: "CRITICAL SAFETY STEP: The Coordinator issues a PATCH to the Source Vault. 'automaticManagementEnabled' is set to False to prevent CPM rotation during the move. A watchdog timer starts — if the pipeline hangs, all frozen accounts are auto-unfrozen after 120 minutes.",
                diff: null,
                specs: [
                    { text: "> PATCH /Accounts/{id}", cls: "" },
                    { text: "> automaticManagement: FALSE", cls: "" },
                    { text: "> State: FROZEN", cls: "info" },
                    { text: "> Watchdog: TIMER_START (120m)", cls: "gold" },
                    { text: "> Emergency unfreeze: ARMED", cls: "gold" },
                ]
            },
            {
                id: "TRANSFORM",
                nodeIdx: 3,
                component: "Agent 04 (Migration Pipeline)",
                action: "Extract + Transform Schema",
                packetState: "frozen",
                packetIcon: "❄️",
                isWarn: false,
                doc: "Agent 04 retrieves the password and full account metadata from CyberArk. It then transforms the data from CyberArk's schema to Secret Server's schema: userName→username (slug), address→machine (slug), platformId→secretTemplateId, and platformAccountProperties→notes. This is NOT a simple copy — the field structure is fundamentally different.",
                diff: "PRIVILEGE CLOUD: Minimal transform — same API surface, same field names. SECRET SERVER: Full schema rewrite — different field slugs, different template model.",
                specs: [
                    { text: "> POST /Accounts/{id}/Password/Retrieve", cls: "" },
                    { text: "> Password: [SECURE_PULL]", cls: "" },
                    { text: "> Map: userName → username (slug)", cls: "info" },
                    { text: "> Map: address → machine (slug)", cls: "info" },
                    { text: "> Map: MSSql → templateId:6003", cls: "info" },
                    { text: "> Map: properties → notes (slug)", cls: "info" },
                    { text: "> Status: PAYLOAD_READY", cls: "" },
                ]
            },
            {
                id: "FOLDER + IMPORT",
                nodeIdx: 4,
                component: "Secret Server API",
                action: "Create Folder & Secret",
                packetState: "ss",
                packetIcon: "📁",
                isWarn: false,
                doc: "Agent 04 creates the folder hierarchy (/Imported/SQL-Prod/) via POST /api/v1/folders, then imports the secret with the mapped template and field items via POST /api/v1/secrets. Authentication uses OAuth2 client credentials — completely different from CyberArk's session token model.",
                diff: "PRIVILEGE CLOUD: POST /Accounts to create in existing Safe (same API). SECRET SERVER: Must create Folder first, then POST /api/v1/secrets with template ID and field item slugs.",
                specs: [
                    { text: "> POST /oauth2/token (client_creds)", cls: "" },
                    { text: "> Auth: Bearer eyJ...truncated", cls: "" },
                    { text: "> POST /api/v1/folders", cls: "info" },
                    { text: "> Created: /Imported/SQL-Prod/", cls: "info" },
                    { text: "> POST /api/v1/secrets", cls: "info" },
                    { text: "> Template: SQL Server Account", cls: "" },
                    { text: "> Response: 200 OK (id: 4417)", cls: "" },
                ]
            },
            {
                id: "HEARTBEAT",
                nodeIdx: 5,
                component: "SS RPC Engine",
                action: "Credential Verification",
                packetState: "ss",
                packetIcon: "💚",
                isWarn: false,
                doc: "Agent 05 triggers a heartbeat via POST /api/v1/secrets/{id}/heartbeat. The Secret Server Distributed Engine (RPC) attempts to log into the SQL Server using the stored credentials. This confirms the password is valid from Secret Server's network path — a different verification method than Privilege Cloud's CPM.",
                diff: "PRIVILEGE CLOUD: POST /Accounts/{id}/Verify via Cloud CPM. SECRET SERVER: POST /api/v1/secrets/{id}/heartbeat via on-prem Distributed Engine (RPC). Requires manual RPC config per template.",
                specs: [
                    { text: "> POST /api/v1/secrets/4417/heartbeat", cls: "info" },
                    { text: "> RPC Engine: Distributed Engine 01", cls: "" },
                    { text: "> Target: sql-prod-01.corp.local:1433", cls: "" },
                    { text: "> Auth attempt: sa@SQL_PROD", cls: "" },
                    { text: "> LastHeartbeatStatus: Success", cls: "" },
                    { text: "> Latency: 180ms", cls: "" },
                    { text: "> Status: CREDENTIAL_VERIFIED", cls: "" },
                ]
            },
            {
                id: "COMPLETE",
                nodeIdx: 6,
                component: "Agent 07 (Compliance)",
                action: "Unfreeze + Audit Closeout",
                packetState: "ss",
                packetIcon: "✅",
                isWarn: true,
                doc: "The source account is unfrozen (CPM re-enabled). Agent 07 verifies compliance evidence across PCI-DSS, NIST 800-53, HIPAA, and SOX. WARNING: CyberArk audit logs do NOT transfer to Secret Server — historical audit history remains only in CyberArk. PSM recordings also cannot be migrated.",
                diff: "PRIVILEGE CLOUD: Audit logs can be migrated. PSM recordings transfer. SECRET SERVER: Audit logs do NOT transfer. PSM recordings do NOT migrate. Must keep CyberArk read-only for retention period.",
                specs: [
                    { text: "> PATCH /Accounts/{id} (UNFREEZE)", cls: "" },
                    { text: "> automaticManagement: TRUE", cls: "" },
                    { text: "> Watchdog: TIMER_STOP", cls: "" },
                    { text: "> Compliance: PCI-DSS ✓ NIST ✓", cls: "" },
                    { text: "> AUDIT LOGS: NOT transferred ⚠", cls: "warn" },
                    { text: "> PSM RECORDINGS: NOT migrated ⚠", cls: "warn" },
                    { text: "> Status: MIGRATION_COMPLETE", cls: "" },
                ]
            }
        ];

        const nodeNames = [
            "Source\nVault",
            "Permission\nMapper",
            "Coordinator",
            "Migration\nPipeline",
            "Secret\nServer",
            "RPC\nEngine",
            "Compliance"
        ];

        function App() {
            const [step, setStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let timer;
                if (isPlaying && step < workflow.length - 1) {
                    timer = setTimeout(() => setStep(s => s + 1), 4500);
                } else if (isPlaying && step >= workflow.length - 1) {
                    setIsPlaying(false);
                }
                return () => clearTimeout(timer);
            }, [isPlaying, step]);

            const current = workflow[step];
            const packetLeft = 4 + (step * (92 / (workflow.length - 1)));

            const restart = () => { setStep(0); setIsPlaying(false); };
            const prev = () => { if (step > 0) setStep(step - 1); };
            const next = () => { if (step < workflow.length - 1) setStep(step + 1); };

            return (
                <div className="app-container">
                    {/* Header */}
                    <div className="header">
                        <h2>Life of a PAM File — Secret Server Migration</h2>
                        <p>Granular Component Interaction for SQL Credential Migration (CyberArk → Delinea Secret Server)</p>
                        <div className="ss-badge">Option A — Permission Model (22→4 Folder Roles + 200+ Role Perms)</div>
                    </div>

                    {/* Controls */}
                    <div className="controls">
                        <button className="btn-step" onClick={restart}>⟲ RESTART</button>
                        <button className="btn-step" onClick={prev} disabled={step === 0}>← PREV</button>
                        <button className={`btn-play ${isPlaying ? 'paused' : ''}`} onClick={() => setIsPlaying(!isPlaying)}>
                            {isPlaying ? "⏸ PAUSE PIPELINE" : "▶ START PIPELINE"}
                        </button>
                        <button className="btn-step" onClick={next} disabled={step >= workflow.length - 1}>NEXT →</button>
                    </div>

                    {/* Step dots */}
                    <div className="step-bar">
                        {workflow.map((w, i) => (
                            <div key={i}
                                className={`step-dot ${i < step ? 'done' : ''} ${i === step ? 'current' : ''}`}
                                style={{ cursor: 'pointer' }}
                                onClick={() => setStep(i)}
                                title={w.id}
                            />
                        ))}
                    </div>

                    {/* Architecture viewport */}
                    <div className="viewport">
                        {/* The traveling PAM file packet */}
                        <div
                            className={`pam-packet ${current.packetState === 'frozen' ? 'frozen' : ''} ${current.packetState === 'ss' ? 'ss' : ''} ${current.packetState === 'danger' ? 'danger' : ''}`}
                            style={{ left: `${packetLeft}%`, top: '35%' }}
                        >
                            <span className="pam-icon">{current.packetIcon}</span>
                            <span className="pam-name">SQL_SVC</span>
                        </div>

                        {/* Component nodes */}
                        {nodeNames.map((name, i) => (
                            <div
                                key={i}
                                className={`comp-node ${step === i ? 'active' : ''} ${step === i && workflow[i].isWarn ? 'warn' : ''}`}
                            >
                                <div style={{ fontSize: '1.3rem' }}>{workflow[i].packetIcon}</div>
                                <div className="comp-label">{name.split('\n').map((l, j) => (
                                    <span key={j}>{l}{j === 0 && name.includes('\n') ? <br/> : null}</span>
                                ))}</div>
                            </div>
                        ))}
                    </div>

                    {/* Documentation Panel */}
                    <div className="doc-panel">
                        <div className={`doc-card ${current.isWarn ? 'warn' : ''}`}>
                            <div className="doc-label">
                                STEP {step + 1} OF {workflow.length} — PROCESS DOCUMENTATION
                            </div>
                            <h3>{current.id}: {current.action}</h3>
                            <p>{current.doc}</p>
                            <div className="executing">
                                <strong>Executing Component:</strong> {current.component}
                            </div>
                            {current.diff && (
                                <div className="ss-diff">
                                    <strong>vs. Privilege Cloud: </strong>{current.diff}
                                </div>
                            )}
                        </div>

                        <div className="tech-specs">
                            <div className="spec-label">LIVE AGENT TELEMETRY</div>
                            {current.specs.map((spec, i) => (
                                <div key={i} className={`spec-line ${spec.cls}`}>{spec.text}</div>
                            ))}
                            <div className={`status-line ${isPlaying ? '' : 'info'}`}>
                                {isPlaying ? "⣾ [PROCESSING...]" : step >= workflow.length - 1 ? "✓ [MIGRATION COMPLETE]" : "⏸ [PAUSED]"}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
