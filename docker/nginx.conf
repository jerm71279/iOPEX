worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ────────────────────────────────────────────────────────
    upstream digital_expert {
        server digital-expert-api:8001;
    }

    upstream mcp_hub {
        server mcp-hub:8002;
    }

    server {
        listen 8080;
        server_name _;

        # ── Gateway Health ───────────────────────────────────────────────
        location /health {
            return 200 '{"status": "healthy", "gateway": "nginx", "stack": "iopex-core"}';
            add_header Content-Type application/json;
        }

        # ── Service Registry (API Discovery) ─────────────────────────────
        location /api/services {
            return 200 '{
                "services": [
                    {"name": "digital-expert-api", "endpoint": "/api/expert/", "port": 8001, "description": "Nexus Knowledge Bot — LangGraph RAG + query API"},
                    {"name": "mcp-hub", "endpoint": "/mcp/", "port": 8002, "description": "MCP Tool Aggregator — shift/iopex/pam-status tools"},
                    {"name": "postgres", "port": 5432, "description": "PostgreSQL + pgvector knowledge base"},
                    {"name": "redis", "port": 6379, "description": "Redis — session state + LangGraph checkpoints"}
                ]
            }';
            add_header Content-Type application/json;
        }

        # ── Digital Expert API ───────────────────────────────────────────
        location /api/expert/ {
            proxy_pass http://digital_expert/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── MCP Hub (SSE endpoints for Claude Code) ──────────────────────
        location /mcp/ {
            proxy_pass http://mcp_hub/mcp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE requires these settings
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_read_timeout 7200s;
        }

        # ── MCP Hub health (direct) ──────────────────────────────────────
        location /mcp-health {
            proxy_pass http://mcp_hub/health;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }
    }
}
